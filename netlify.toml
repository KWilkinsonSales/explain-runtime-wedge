[build]
  command = "cd explain-runtime-build && pnpm install --ignore-workspace && npm run build"
  publish = "explain-runtime-build/dist"

[build.environment]
  # Explicit production enable for the Family History Intelligence OS Slice 0
  # surface (/family-history). The flag still defaults OFF in code; this is
  # the one deliberate switch that turns it on for Netlify builds.
  VITE_FEATURE_FHGI_OS_SLICE0 = "true"

[context.deploy-preview.environment]
  # Preview-only enable for the Slice 1 Tree + Person Workspace shell, so it
  # can be visually reviewed on deploy previews. Production inherits only the
  # [build.environment] block above — Slice 1 stays OFF in production until
  # its own deliberate switch is added there.
  VITE_FEATURE_FHGI_OS_SLICE1 = "true"

[functions]
  directory = "netlify/functions"
