name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - sprint0/reference-runtime-playground

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile=false
      # Build first: @adl/ui and @adl/harness-cli resolve their workspace
      # dependencies' types from each package's emitted dist/.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: mkdir -p artifacts && pnpm proof | tee artifacts/runtime-proof.json
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-proof
          path: artifacts/runtime-proof.json
